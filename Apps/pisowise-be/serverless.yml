
service: pisowise-be
frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: ap-southeast-1

functions:
  api:
    handler: app.handler
    description: FastAPI backend for PisoWise project deployed using Serverless Framework
    events:
      - httpApi: '*'

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    useStaticCache: false