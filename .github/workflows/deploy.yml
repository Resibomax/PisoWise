name: Deploy Pisowise Backend

on:
  push:
    branches:
      - main
      - staging
      - staging-test
    paths:
      - 'Apps/pisowise-be/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/pisowise-be

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g serverless@3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy with Serverless
        run: |
          STAGE=$([ "${GITHUB_REF##*/}" = "main" ] && echo "prod" || echo "staging")
          echo "Deploying to $STAGE..."
          npx serverless deploy --stage $STAGE
          
      - name: Print AWS-USER
        run: |
          echo "AWS-USER: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS-SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "AWS-REGION: ap-southeast-1"
          echo "Deployment completed successfully."
          aws sts get-caller-identity