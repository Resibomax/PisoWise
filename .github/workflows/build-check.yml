name: Build Check

on:
  push:
    branches:
      - '**'
    paths:
      - 'Apps/pisowise-fe/**'
      - '.github/workflows/build-check.yml'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint check
        run: npm run lint

      - name: Build project
        run: npm run build
